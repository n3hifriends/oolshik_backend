server:
  forward-headers-strategy: framework

spring:
  flyway:
    locations:
      - classpath:db/migration
  jpa:
    properties:
      hibernate:
        format_sql: false

app:
  docs:
    enabled: false
  admin:
    seed:
      enabled: false
  security:
    firebase:
      enabled: false
  messaging:
    kafka:
      enabled: false

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
