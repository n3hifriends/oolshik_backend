name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: oolshik
          POSTGRES_USER: oolshik
          POSTGRES_PASSWORD: oolshik
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U oolshik -d oolshik"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    permissions:
      contents: read

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: oolshik
      DB_USER: oolshik
      DB_PASSWORD: oolshik
      APP_SECURITY_FIREBASE_ENABLED: "false"
      APP_MESSAGING_KAFKA_ENABLED: "false"
      ADMIN_SEED_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run unit tests
        run: ./mvnw -q test

      - name: Build production artifact
        run: ./mvnw -q -DskipTests package

      - name: Build Docker image
        run: docker build -t oolshik-backend:ci .

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
